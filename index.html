<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exposures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎞️</text></svg>">
</head>
<body>
    <header class="siteHeader">
        <div class="container">
            <h1 class="siteTitle">Exposures</h1>
            <p class="siteSubtitle">A personal visual diary</p>
        </div>
    </header>

    <section class="filtersSection">
        <div class="container">
            <div class="filterButtons" id="filterButtons">
                <button class="filterBtn active" data-category="all">All</button>
                <button class="filterBtn" data-category="Street">Street</button>
                <button class="filterBtn" data-category="Summer">Summer</button>
                <button class="filterBtn" data-category="Travel">Travel</button>
                <button class="filterBtn" data-category="Events">Events</button>
                <button class="filterBtn" data-category="People">People</button>
                <button class="filterBtn" data-category="Rolls">Rolls</button>
            </div>
        </div>
    </section>

    <section class="rollsSection" id="rollsSection" style="display:none;">
        <div class="container">
            <div class="rollsCard">
                <div class="rollsStrip" aria-label="Roll #1 film strip preview">
                    <div class="rollsPerforations rollsPerforationsTop"></div>
                    <div class="rollsFramesRow" id="rollsStripFrames"></div>
                    <div class="rollsPerforations rollsPerforationsBottom"></div>
                </div>
                <button class="slideshowBtn" id="slideshowBtn">▶ [ROLL #01 // THE CAROUSEL]</button>
                <p class="rollsNote">A personal selection of frames shaped by nostalgia</p>
            </div>
        </div>
    </section>

    <div class="slideshow" id="slideshow">
        <audio id="slideshowAudio" src="https://res.cloudinary.com/da9tytxsu/video/upload/v1777742168/mad-men-1x13-el-carrusel_5MOtrL0U_bgtmys.mp3"></audio>
        <button class="slideshowClose" id="slideshowClose">✕</button>
        <div class="slideshowImageWrapper">
            <img src="" alt="" id="slideshowImg" />
            <div class="slideshowCaption">
                <h2 class="slideshowTitle" id="slideshowTitle"></h2>
                <p class="slideshowMeta" id="slideshowMeta"></p>
            </div>
        </div>
        <div class="slideshowControls">
            <button class="slideshowNav" id="slideshowPrev">&#9664;</button>
            <button class="slideshowMute" id="slideshowMuteBtn" aria-label="Toggle mute">
  <svg class="icon-audio-on" viewBox="0 0 16 16">
    <path d="M9 4a.5.5 0 0 0-.812-.39L5.825 5.5H3.5A.5.5 0 0 0 3 6v4a.5.5 0 0 0 .5.5h2.325l2.363 1.89A.5.5 0 0 0 9 12V4zm3.025 4a4.486 4.486 0 0 1-1.318 3.182L10 10.475A3.489 3.489 0 0 0 11.025 8 3.49 3.49 0 0 0 10 5.525l.707-.707A4.486 4.486 0 0 1 12.025 8z"/>
  </svg>

  <svg class="icon-audio-muted" viewBox="0 0 16 16">
    <path d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06zm7.137 2.096a.5.5 0 0 1 0 .708L12.207 8l1.647 1.646a.5.5 0 0 1-.708.708L11.5 8.707l-1.646 1.647a.5.5 0 0 1-.708-.708L10.793 8 9.146 6.354a.5.5 0 1 1 .708-.708L11.5 7.293l1.646-1.647a.5.5 0 0 1 .708 0z"/>
  </svg>
</button>
            <button class="slideshowNav" id="slideshowNext">&#9654;</button>
        </div>
    </div>

    <main class="container">
        <div class="row" id="cardsContainer"></div>
    </main>

    <footer class="siteFooter">
    <div class="container">
        <p>© 2026 Exposures — All moments reserved.</p>
        <a href="https://github.com/Daaniel-Sans" target="_blank" rel="noopener noreferrer" class="footerLink" aria-label="GitHub Profile">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
            </svg>
        </a>

        <a href="https://linkedin.com/in/danpavtel" target="_blank" rel="noopener noreferrer" class="footerLink" aria-label="LinkedIn Profile">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-linkedin" viewBox="0 0 16 16">
                    <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z"/>
                </svg>
            </a>
    </div>
</footer>

    <div class="lightbox" id="lightbox">
        <div class="lightboxInner">
            <div class="lightboxMain">
                <div class="lightboxLeft">
                    <p class="lightboxDescription" id="lightboxDescription"></p>
                </div>
                <div class="lightboxCenter">
                    <div class="lightboxNavBar">
                        <button class="lightboxNavLink" id="lightboxPrev" aria-label="Anterior imagen">Previous</button>
                        <button class="lightboxNavLink lightboxNavClose" id="lightboxClose" aria-label="Cerrar ventana">Close</button>
                        <button class="lightboxNavLink" id="lightboxNext" aria-label="Siguiente imagen">Next</button>
                    </div>
                    <h2 class="lightboxTitle" id="lightboxTitle"></h2>
                    <div class="lightboxImgWrap">
                        <img src="" alt="" id="lightboxImg" />
                    </div>
                    <div class="lightboxMeta" id="lightboxMeta"></div>
                </div>
                <div class="lightboxRight"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
