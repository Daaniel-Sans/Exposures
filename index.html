<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exposures</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <header class="siteHeader">
      <div class="container">
        <h1 class="siteTitle">Exposures</h1>
        <p class="siteSubtitle">A personal visual diary</p>
      </div>
    </header>

    <section class="filtersSection">
      <div class="container">
        <div class="filterButtons" id="filterButtons">
          <button class="filterBtn active" data-category="all">All</button>
          <button class="filterBtn" data-category="Street">Street</button>
          <button class="filterBtn" data-category="Summer">Summer</button>
          <button class="filterBtn" data-category="Travel">Travel</button>
          <button class="filterBtn" data-category="Events">Events</button>
          <button class="filterBtn" data-category="People">People</button>
          <button class="filterBtn" data-category="Autumn">Autumn</button>
          <button class="slideshowTriggerBtn" id="slideshowBtn">Play Slideshow</button>
        </div>
      </div>
    </section>

    <main class="mainContent">
      <div class="container" id="cardsContainer">
        </div>
    </main>

    <footer class="siteFooter">
      <div class="container">
        <p>© 2024 Exposures — All moments reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
